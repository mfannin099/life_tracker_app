<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        form { margin-bottom: 20px; }
        label { display: block; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin-top: 5px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .entries { margin-top: 20px; }
        .entry { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Weight Tracker</h1>
    <form action="/weights" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="date">Date (mm-dd-yyyy):</label>
        <input type="text" id="date" name="date" placeholder="04-14-2026" required>

        <label for="weight">Weight (lbs, one decimal):</label>
        <input type="number" id="weight" name="weight" step="0.1" placeholder="150.5" required>

        <button type="submit">Add Weight</button>
    </form>

    <div class="entries">
        <h2>Recent Entries</h2>
        <div id="entries-list">
            <!-- Entries will be loaded here -->
        </div>
        <button onclick="loadEntries()">Refresh Entries</button>
    </div>

    <script>
        async function loadEntries() {
            try {
                const response = await fetch('/weights');
                const data = await response.json();
                const entriesDiv = document.getElementById('entries-list');
                entriesDiv.innerHTML = data.weights.map(entry =>
                    `<div class="entry">
                        <strong>${entry.name}</strong> - ${entry.date}: ${entry.weight} lbs
                        <br><small>Added: ${entry.created_at}</small>
                    </div>`
                ).join('');
            } catch (error) {
                console.error('Error loading entries:', error);
            }
        }

        // Load entries on page load
        loadEntries();
    </script>
</body>
</html>
